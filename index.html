<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>HBD For You! ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-color: #9333ea; 
            --accent-color: #A78BFA;  
            --bg-color: #ffffff;      
            --text-dark: #1e1b4b;     
        }

        /* Set dasar agar bisa scroll */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-dark);
            font-family: 'Poppins', sans-serif;
            /* Paksa scroll aktif */
            overflow-y: auto !important;
            -webkit-overflow-scrolling: touch;
        }

        /* Overlay Kado - Menutup layar penuh di awal */
        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .gift-box {
            font-size: 80px;
            cursor: pointer;
            filter: drop-shadow(0 0 10px var(--accent-color));
            animation: bounce 2s infinite;
            background: #f3e8ff; 
            padding: 25px;
            border-radius: 35px;
            line-height: 1;
            user-select: none;
        }

        /* Wrapper konten utama */
        .main-wrapper {
            display: none; /* Sembunyi sampai kado diklik */
            width: 100%;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem;
            color: var(--primary-color);
            margin-top: 10px;
        }

        .message {
            font-size: 1.05rem;
            line-height: 1.8;
            color: #4b5563;
            white-space: pre-wrap; /* Jaga spasi dan baris baru */
            word-wrap: break-word;
            margin-bottom: 30px;
        }

        .btn-misteri {
            background: var(--primary-color);
            border: none;
            color: white;
            padding: 16px 32px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            display: none; /* Muncul setelah ketik selesai */
            margin: 20px auto;
            box-shadow: 0 4px 15px rgba(147, 51, 234, 0.3);
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-15px);}
            60% {transform: translateY(-7px);}
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="gift-box" onclick="openGift()">🎁</div>
        <p style="margin-top: 20px; color: var(--primary-color); font-weight: 600;">KETUK KADONYA</p>
    </div>

    <div class="main-wrapper" id="mainWrapper">
        <div class="container">
            <h1 id="title">Happy Birthday!</h1>
            <div class="message" id="typewriter"></div>
            <button class="btn-misteri" id="secretBtn" onclick="extraSurprise()">Buka Hadiah Terakhir ✨</button>
        </div>
    </div>

    <script>
        const messageText = "Selamat ulang tahun buat Ayanggg! 😘 Semoga Ayaangg selalu di berikan kemudahan dan juga kebahagiaan, semoga di umur ayangg yang sekarang ini, ayaang bisa menjadi pribadi yang lebih baik lagi yahh cantikknyaa akuu. Semangat teruss yaahh cantikknya akuu, akuu selaluu sayaang camaa ayangg, akuu selaluu mauu ayaangg menjadii ayaangg, yang selaluu manjaa ke akuu, dan selaluu buatt akuu happy dan selaluu buat akuuu gregett, tapii itu yang membuat aku semakinn sayang sama ayaangg, akuu mauu samaa ayaang teruss, dan aku mauu mewujudkan semua wishlist ayaang, semogaa ayaangg selaluu dalam lindungan Allah yaah cantikknyaa akuu, akuu mauu ayaangnyaaa jangan tinggalin sholat yahh cantiknyaa akuu, dan jangan tingalin akuu jugaa hehe, ocee cantikknyaa akuu, love you moreee moreeee moreeee moreee moree cantikknyaa cintaaaanyaaa isrtiiiinyaa lucuuunyaaa ayaangnyaaa imuttnyaa akuuuuu !";
        let index = 0;

        function fireFireworks() {
            var duration = 5 * 1000;
            var animationEnd = Date.now() + duration;
            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                
                confetti({
                    particleCount: 30,
                    startVelocity: 30,
                    spread: 360,
                    origin: { x: Math.random(), y: Math.random() - 0.2 },
                    colors: ['#A78BFA', '#E6E6FA', '#9333ea']
                });
            }, 300);
        }

        function openGift() {
            // 1. Efek ledakan
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

            // 2. Hilangkan kado dan tampilkan wrapper utama
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('mainWrapper').style.display = 'block';

            // 3. Jalankan kembang api & mulai ngetik
            fireFireworks();
            typeWriter();
        }

        function typeWriter() {
            if (index < messageText.length) {
                document.getElementById("typewriter").innerHTML += messageText.charAt(index);
                index++;
                
                // Scroll otomatis ke bawah saat ngetik biar Ayang nggak capek scroll manual pas teksnya nambah
                window.scrollTo(0, document.body.scrollHeight);
                
                setTimeout(typeWriter, 40);
            } else {
                document.getElementById('secretBtn').style.display = 'block';
            }
        }

        function extraSurprise() {
            fireFireworks();
            alert("Every moment with you is precious. I’m grateful to have you. Happy birthday!! 🥳🎉💜");
        }
    </script>
</body>
</html>
